
version: 2.1

jobs:
  backend_ci:
    docker:
      - image: cimg/node:18.0
    steps:
      - checkout
      - run:
          name: Install Backend Dependencies
          command: |
            cd backend
            npm install
      - run:
          name: Run Backend Tests
          command: |
            cd backend
            npm test || echo "No tests"

  frontend_ci:
    docker:
      - image: cimg/node:18.0
    steps:
      - checkout
      - run:
          name: Install Frontend Dependencies
          command: |
            cd frontend
            npm install
            npm run build

  deploy_to_ec2:
    docker:
      - image: cimg/base:stable
    steps:
      - add_ssh_keys:
          fingerprints:
            - "SHA256:tJRSAry4KQvSmwajdRx0E6aEiDKrt76yj4TCXrcjSAI"
      - run:
          name: Deploy to EC2
          command: |
            ssh -o StrictHostKeyChecking=no ec2-user@43.205.114.28 "
              if ! command -v git &> /dev/null; then
                sudo yum install -y git
              fi &&
              if ! command -v node &> /dev/null; then
                curl -fsSL https://rpm.nodesource.com/setup_18.x | sudo bash -
                sudo yum install -y nodejs
              fi &&
              if ! command -v pm2 &> /dev/null; then
                sudo npm install -g pm2
              fi &&
              if [ ! -d /home/ec2-user/blog-app ]; then
                git clone https://github.com/saikiran290/hashtek-blog-app.git /home/ec2-user/blog-app
              fi &&
              cd /home/ec2-user/blog-app &&
              git pull origin main --force &&
              git stash push -m "Stashing local .env changes" &&
              rm -f backend/.env &&
              echo "DATABASE_URL=postgresql://postgres:saipotnuru@123@localhost:5432/postgresscontent_media_app" > backend/.env &&
              echo "JWT_SECRET=superpower123" >> backend/.env &&
              echo "JWT_EXPIRES_IN=7d" >> backend/.env &&
              echo "BCRYPT_ROUNDS=12" >> backend/.env &&
              echo "NODE_ENV=production" >> backend/.env &&
              echo "CORS_ORIGIN=http://localhost:3000" >> backend/.env &&
              cd backend && npm install && cd .. &&
              cd frontend && npm install && npm run build && cd .. &&
              ls -la frontend/dist/ &&
              pm2 restart blog-app -f || pm2 start backend/server.js --name blog-app
            "

workflows:
  ci_cd_pipeline:
    jobs:
      - backend_ci
      - frontend_ci
      - deploy_to_ec2:
          requires:
            - backend_ci
            - frontend_ci


